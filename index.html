<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        
        /* Header & Settings Icon */
        .header { position: relative; margin-bottom: 30px; }
        .settings-icon { position: absolute; right: 0; top: 0; color: #7f8c8d; font-size: 28px; cursor: pointer; transition: 0.3s; }
        .settings-icon:hover { color: var(--accent); transform: rotate(90deg); }
        .logo-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 10px; }
        
        /* Search Bar */
        .search-box { background: #162130; border: 1px solid #2c3e50; border-radius: 8px; padding: 12px; width: 90%; max-width: 500px; margin: 20px auto; color: white; display: block; outline: none; }

        /* Book List Style (የቀድሞው ውበት) */
        .book-item { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px auto; max-width: 500px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; transition: 0.3s; }
        .book-item:hover { border-color: var(--accent); }
        .book-info { font-weight: bold; text-align: left; font-size: 16px; flex-grow: 1; }
        .btn-group { display: flex; gap: 8px; }
        .btn-read { background: var(--accent); color: black; padding: 6px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-down { background: var(--blue); color: white; padding: 6px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }

        /* Modal Design */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 25px; width: 85%; max-width: 450px; border-radius: 20px; border: 2px solid var(--accent); text-align: left; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: white; }
        
        /* Styled Buttons in Settings */
        .admin-btn { background: var(--accent); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .admin-btn:hover { background: #d4ac0d; }
        .admin-section { margin-top: 25px; }
        
        /* Admin List Scroll */
        #adminList { max-height: 200px; overflow-y: auto; margin-top: 15px; background: #0d1621; border-radius: 10px; padding: 10px; }
        .admin-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2c3e50; font-size: 14px; align-items: center; }
        .delete-btn-styled { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .tg-link { display: flex; align-items: center; gap: 10px; color: #0088cc; text-decoration: none; font-weight: bold; margin-top: 20px; padding: 12px; background: #162130; border-radius: 10px; justify-content: center; border: 1px solid #0088cc; }
    </style>
</head>
<body>

        <div class="book-item"><div class="book-info" id="b2">ጉባኤ ኒቅያ (Nicaea)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>
        <div class="book-item"><div class="book-info" id="b3">ጉባኤ ኤፌሶን (Ephesus)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>

                <div id="adminList">እየፈለገ ነው...</div>
