<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Digital Library</title>
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        
        header { background: #1e293b; padding: 40px 20px; border-bottom: 4px solid var(--accent); position: relative; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); background: white; object-fit: cover; }

        /* Settings Sidebar */
        .settings-trigger { position: absolute; top: 15px; right: 15px; font-size: 26px; cursor: pointer; color: white; z-index: 1001; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: #161b22; transition: 0.3s; z-index: 1002; text-align: left; }
        .sidebar.active { right: 0; }
        .sidebar-header { padding: 20px; background: #0d1117; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        .menu-item { display: block; padding: 15px 20px; color: #c9d1d9; text-decoration: none; border-bottom: 1px solid #21262d; cursor: pointer; }
        
        /* Language Dropdown */
        .lang-options { display: none; background: #000; }
        .lang-options.show { display: block; }
        .lang-choice { padding: 12px 40px; display: block; color: #8b949e; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .container { max-width: 600px; margin: auto; padding: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; box-sizing: border-box; }

        /* File list item - All visible and downloadable */
        .file-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .file-name { font-weight: bold; font-size: 14px; text-align: left; flex: 1; margin-right: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .btn { padding: 8px 10px; border-radius: 5px; text-decoration: none; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .btn-view { background: var(--accent); color: #000; }
        .btn-down { background: var(--primary); color: #fff; }
        
        footer { padding: 20px; font-size: 13px; color: #8b949e; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <b id="menuTitle">ምናሌ</b>
        <span onclick="toggleSidebar()" style="cursor:pointer;">✕</span>
    </div>
    <div class="sidebar-menu">
        <a href="#" class="menu-item" id="menuHome">🏠 መነሻ ገጽ</a>
        <div class="menu-item" onclick="toggleLangMenu()" id="menuLang">🌐 ቋንቋ ቀይር ▾</div>
        <div class="lang-options" id="langOptions">
            <span class="lang-choice" onclick="changeLang('am')">አማርኛ</span>
            <span class="lang-choice" onclick="changeLang('en')">English</span>
            <span class="lang-choice" onclick="changeLang('ar')">العربية</span>
            <span class="lang-choice" onclick="changeLang('es')">Español</span>
        </div>
        <a href="https://t.me/Justice_Yewul" target="_blank" class="menu-item" id="menuTele">💬 ቴሌግራም (Justice)</a>
    </div>
</div>

<header>
    <div class="settings-trigger" onclick="toggleSidebar()">⚙️</div>
    <img src="IMG_20260224_043626_122.jpg" class="profile-img">
    <h1 id="mainTitle">የየውልሰው መድረክ</h1>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="መጽሐፍ እዚህ ይፈልጉ..." oninput="searchFunc()">
    
    <div id="bookList">
        <div class="file-item">
            <span class="file-name">መጽሐፍ ቅዱስ (Bible)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
        <div class="file-item">
            <span class="file-name">ጉባኤ ኒቂያ (Nicaea)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
        <div class="file-item">
            <span class="file-name">ጉባኤ ኤፌሶን (Ephesus)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
        <div class="file-item">
            <span class="file-name">ጉባኤ ኬልቄዶን (Chalcedon)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
        <div class="file-item">
            <span class="file-name">ጉባኤ ቆስጥንጥንያ (Constantinople)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ቆስጥንጥንያ - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p id="footerText">© 2018 አ.ም የተሰራ | የየውልሰው ዲጂታል ቤተ-መጽሐፍ</p>
</footer>

<script>
    var translations = {
        am: { title: "የየውልሰው መድረክ", search: "መጽሐፍ እዚህ ይፈልጉ...", view: "አንብብ", down: "አውርድ", menu: "ምናሌ", home: "🏠 መነሻ ገጽ", lang: "🌐 ቋንቋ ቀይር ▾", tele: "💬 ቴሌግራም", footer: "© 2018 አ.ም የተሰራ | የየውልሰው ዲጂታል ቤተ-መጽሐፍ", dir: "ltr" },
        en: { title: "Yewul Platform", search: "Search books here...", view: "Read", down: "Download", menu: "Menu", home: "🏠 Home", lang: "🌐 Change Language ▾", tele: "💬 Telegram", footer: "© 2018 E.C | Yewul Digital Library", dir: "ltr" },
        ar: { title: "منصة يولسو", search: "ابحث عن الكتب هنا...", view: "اقرأ", down: "تحميل", menu: "القائمة", home: "🏠 الرئيسية", lang: "🌐 تغيير اللغة ▾", tele: "💬 تيليجرام", footer: "© 2018 | المكتبة الرقمية", dir: "rtl" },
        es: { title: "Plataforma Yewul", search: "Buscar libros aquí...", view: "Leer", down: "Bajar", menu: "Menú", home: "🏠 Inicio", lang: "🌐 Cambiar idioma ▾", tele: "💬 Telegram", footer: "© 2018 | Biblioteca Digital", dir: "ltr" }
    };

    function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('overlay');
        sb.classList.toggle('active');
        ov.classList.toggle('active');
    }

    function toggleLangMenu() {
        var opt = document.getElementById('langOptions');
        opt.classList.toggle('show');
    }

    function changeLang(lang) {
        var t = translations[lang];
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('searchInput').placeholder = t.search;
        document.getElementById('menuTitle').innerText = t.menu;
        document.getElementById('menuHome').innerText = t.home;
        document.getElementById('menuLang').innerText = t.lang;
        document.getElementById('menuTele').innerText = t.tele;
        document.getElementById('footerText').innerText = t.footer;
        
        var vTexts = document.getElementsByClassName('viewText');
        for(var i=0; i<vTexts.length; i++) vTexts[i].innerText = t.view;
        
        var dTexts = document.getElementsByClassName('downText');
        for(var i=0; i<dTexts.length; i++) dTexts[i].innerText = t.down;

        document.body.style.direction = t.dir;
        toggleSidebar();
    }

    function searchFunc() {
        var input = document.getElementById('searchInput').value.toLowerCase();
        var items = document.getElementsByClassName('file-item');
        for (var i = 0; i < items.length; i++) {
            var name = items[i].getElementsByClassName('file-name')[0].innerText.toLowerCase();
            items[i].style.display = name.indexOf(input) > -1 ? "flex" : "none";
        }
    }
</script>

</body>
</html>
