<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የየውልሰው ዲጂታል ቤተ-መጽሐፍ</title>
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: white; overflow-x: hidden; }
        
        /* ማራኪ ሄደር */
        header { 
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), 
                        url('IMG_20260224_043626_122.jpg') center/cover;
            padding: 80px 20px; text-align: center; border-bottom: 4px solid var(--accent);
            animation: fadeIn 1.5s ease-in;
        }
        .profile-img { 
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); 
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); transition: 0.5s;
        }
        .profile-img:hover { transform: scale(1.1) rotate(5deg); }

        .container { max-width: 800px; margin: -40px auto 40px; padding: 20px; position: relative; }

        /* የፍለጋ ሳጥን */
        .search-container { position: sticky; top: 20px; z-index: 100; margin-bottom: 30px; }
        .search-box { 
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #334155; 
            background: rgba(30, 41, 59, 0.95); color: white; font-size: 16px; 
            backdrop-filter: blur(10px); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* የመጽሐፍት ካርድ */
        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { color: var(--accent); margin-bottom: 20px; font-size: 1.5rem; border-left: 5px solid var(--accent); padding-left: 10px; }

        .file-grid { display: grid; gap: 20px; }
        .file-item { 
            background: #2d3748; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; border: 1px solid #3e4b5e;
        }
        .file-item:hover { transform: translateX(10px); background: #334155; border-color: var(--accent); }
        .file-name { font-weight: bold; font-size: 1.1rem; }

        /* ቁልፎች */
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            padding: 10px 20px; border-radius: 10px; text-decoration: none; 
            font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .btn-view { background: var(--accent); color: #000; }
        .btn-down { background: var(--primary); color: #fff; }
        .btn:active { transform: scale(0.9); }

        /* አኒሜሽን */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #noResult { display: none; text-align: center; padding: 20px; color: #94a3b8; }

        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="IMG_20260224_043626_122.jpg" class="profile-img" alt="Profile">
    <h1 style="margin-top: 15px; font-size: 2.5rem;">የየውልሰው መድረክ</h1>
    <p style="color: #cbd5e1;">የእውቀት እና የመንፈሳዊ መጻሕፍት ማከማቻ</p>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="የመጽሐፍ ስም እዚህ ይፈልጉ..." onkeyup="filterFiles()">
    </div>

    <div class="card">
        <h2>የጉባኤያት መጻሕፍት</h2>
        <div id="fileGrid" class="file-grid">
            
            <div class="file-item">
                <span class="file-name">ጉባኤ ኒቂያ</span>
                <div class="btn-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                    <a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

            <div class="file-item">
                <span class="file-name">ጉባኤ ኤፌሶን</span>
                <div class="btn-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                    <a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

            <div class="file-item">
                <span class="file-name">ጉባኤ ኬልቄዶን</span>
                <div class="btn-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                    <a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

            <div class="file-item">
                <span class="file-name">ጉባኤ ቆስጥንጥንያ</span>
                <div class="btn-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ቆስጥንጥንያ - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                    <a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

        </div>
        <div id="noResult">የፈለጉት መጽሐፍ አልተገኘም!</div>
    </div>
</div>

<footer>
    <p>&copy; 2026 የየውልሰው ዲጂታል ቤተ-መጽሐፍ | All Rights Reserved</p>
</footer>

<script>
function filterFiles() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let grid = document.getElementById('fileGrid');
    let items = grid.getElementsByClassName('file-item');
    let noResult = document.getElementById('noResult');
    let found = false;

    for (let i = 0; i < items.length; i++) {
        let name = items[i].querySelector('.file-name').innerText.toLowerCase();
        if (name.includes(input)) {
            items[i].style.display = "flex";
            found = true;
        } else {
            items[i].style.display = "none";
        }
    }
    noResult.style.display = found ? "none" : "block";
}
</script>

</body>
</html>
