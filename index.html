<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Digital Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        
        /* Header & Profile Section */
        header { position: relative; padding-top: 20px; }
        .settings-btn { position: absolute; left: 15px; top: 15px; font-size: 28px; cursor: pointer; color: #7f8c8d; }
        .profile-ring { width: 125px; height: 125px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .profile-ring img { width: 100%; height: 100%; object-fit: cover; }
        .platform-name { font-size: 26px; font-weight: bold; margin: 15px 0 5px; }
        .yellow-line { border-bottom: 2px solid var(--accent); width: 100%; margin: 10px 0; }
        .estab-text { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 25px; }

        /* Search Bar */
        .search-box { width: 90%; max-width: 500px; padding: 12px; background: #162130; border: 1px solid #2c3e50; border-radius: 10px; color: white; margin-bottom: 25px; outline: none; }

        /* Book Card Style */
        .book-item { background: var(--card); border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 520px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; }
        .book-name { font-weight: bold; text-align: left; flex: 1; font-size: 15px; padding-right: 10px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 12px; border: none; cursor: pointer; display: inline-block; }
        .btn-view { background: var(--accent); color: black; }
        .btn-down { background: var(--blue); color: white; }

        /* Settings Sidebar */
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: #161b22; transition: 0.4s; z-index: 2000; text-align: left; padding: 25px; box-sizing: border-box; border-right: 2px solid var(--accent); }
        .sidebar.active { left: 0; }
        .close-sidebar { float: right; font-size: 26px; cursor: pointer; }
        .sidebar h3 { color: var(--accent); margin-top: 0; }
        label { display: block; margin: 20px 0 8px; font-weight: bold; font-size: 14px; color: #bdc3c7; }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; background: #0d1621; color: white; border: 1px solid #2c3e50; margin-bottom: 10px; }
        .action-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-list { margin-top: 20px; max-height: 250px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .del-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2c3e50; font-size: 12px; align-items: center; }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <span class="close-sidebar" onclick="toggleSidebar()">&times;</span>
    <h3 id="sTitle">⚙️ ሴቲንግ</h3>
    
    <label id="lLang">🌐 ቋንቋ መቀየሪያ</label>
    <select id="langSel" onchange="applyLanguage()">
        <option value="am">አማርኛ</option>
        <option value="en">English</option>
        <option value="ge">ግዕዝ</option>
        <option value="ti">ትግርኛ</option>
        <option value="or">Oromoo</option>
        <option value="wo">Wolaytta</option>
    </select>

    <label id="lUp">📤 አዲስ ፋይል ጫን</label>
    <input type="file" id="fIn">
    <button class="action-btn" onclick="upload()" id="bUp">ወደ ሰርቨር ላክ</button>
    
    <button class="action-btn" onclick="location.reload()" style="background:#27ae60; color:white; margin-top:15px;" id="bRef">🔄 Refresh</button>

    <label id="lDel" style="margin-top:25px; color:var(--red);">🗑️ ፋይሎችን አጥፋ</label>
    <div id="adminArea" class="del-list">በመፈለግ ላይ...</div>
</div>

<header>
    <i class="fas fa-cog settings-btn" onclick="toggleSidebar()"></i>
    <div class="profile-ring">
        <img src="https://res.cloudinary.com/dsbvs1h3w/image/upload/v1741951566/1000010372_yubv8s.jpg" alt="Profile">
    </div>
    <h1 class="platform-name" id="pTitle">የየውልሰው መድረክ</h1>
    <div class="yellow-line"></div>
    <div class="estab-text" id="eDate">የተመሰረተበት 2018 ዓ.ም</div>
</header>

<input type="text" id="search" class="search-box" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="searchBooks()">

<div id="bookContainer">
    <div class="book-item"><span class="book-name" id="b1">መጽሐፍ ቅዱስ (Bible)</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/username/repo/main/መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div class="book-item"><span class="book-name" id="b2">ጉባኤ ኒቂያ (Nicaea)</span><div class="btn-group"><a href="ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div class="book-item"><span class="book-name" id="b3">ጉባኤ ኤፌሶን (Ephesus)</span><div class="btn-group"><a href="ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div class="book-item"><span class="book-name" id="b4">ጉባኤ ኬልቄዶን (Chalcedon)</span><div class="btn-group"><a href="ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div class="book-item"><span class="book-name" id="b5">ጉባኤ ቁስጥንጥንያ</span><div class="btn-group"><a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div id="dynamicArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI", authDomain: "yewul-platform.firebaseapp.com", projectId: "yewul-platform", databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com", storageBucket: "yewul-platform.firebasestorage.app", appId: "1:731322746896:web:a2a9e7d9f0769b366d2295" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');

    window.applyLanguage = () => {
        const l = document.getElementById('langSel').value;
        const t = {
            am: {mt:"የየውልሰው መድረክ", b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቂያ", b3:"ጉባኤ ኤፌሶን", b4:"ጉባኤ ኬልቄዶን", b5:"ጉባኤ ቁስጥንጥንያ", v:"አንብብ", d:"አውርድ", sh:"መጽሐፍት እዚህ ይፈልጉ...", up:"ወደ ሰርቨር ላክ", ref:"🔄 አድስ", del:"🗑️ ፋይሎችን አጥፋ", est:"የተመሰረተበት 2018 ዓ.ም", st:"⚙️ ሴቲንግ"},
            en: {mt:"Yewul Platform", b1:"Holy Bible", b2:"Nicaea Council", b3:"Ephesus Council", b4:"Chalcedon Council", b5:"Constantinople", v:"Read", d:"Download", sh:"Search books...", up:"Upload", ref:"🔄 Refresh", del:"🗑️ Delete Files", est:"Established in 2018", st:"⚙️ Settings"}
        };
        const c = t[l] || t.am;
        document.getElementById('pTitle').innerText = c.mt; document.getElementById('eDate').innerText = c.est;
        document.getElementById('sTitle').innerText = c.st; document.getElementById('bUp').innerText = c.up;
        document.getElementById('bRef').innerText = c.ref; document.getElementById('lDel').innerText = c.del;
        document.getElementById('search').placeholder = c.sh;
        document.getElementById('b1').innerText = c.b1; document.getElementById('b2').innerText = c.b2;
        document.querySelectorAll('.vTxt').forEach(x => x.innerText = c.v); document.querySelectorAll('.dTxt').forEach(x => x.innerText = c.d);
    };

    window.upload = async () => {
        const file = document.getElementById('fIn').files[0]; if(!file) return alert("ፋይል ምረጥ!");
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'yewul_preset');
        try {
            const r = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
            const d = await r.json();
            if(d.secure_url) {
                await set(push(ref(db, 'books')), { name: file.name, url: d.secure_url });
                alert("ተሳክቷል! ✅");
            }
        } catch(e) { alert("ስህተት ተፈጥሯል!"); }
    };

    onValue(ref(db, 'books'), (sn) => {
        const dyn = document.getElementById('dynamicArea'); const adm = document.getElementById('adminArea');
        dyn.innerHTML = ""; adm.innerHTML = "";
        const data = sn.val();
        if(data) {
            Object.keys(data).forEach(id => {
                dyn.innerHTML += `<div class="book-item"><span class="book-name">${data[id].name}</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=${data[id].url}" target="_blank" class="btn btn-view">Read</a><a href="${data[id].url}" download="${data[id].name}" class="btn btn-down">Download</a></div></div>`;
                adm.innerHTML += `<div class="del-item"><span>${data[id].name.substring(0,18)}</span><button class="btn-del" onclick="delItem('${id}')">አጥፋ</button></div>`;
            });
        }
    });

    window.delItem = (id) => { if(confirm("ይህ ፋይል ለዘላለም ይጥፋ?")) remove(ref(db, 'books/'+id)).then(()=>alert("ጠፍቷል!")); };
    window.searchBooks = () => {
        let q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.book-item').forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    };
</script>
</body>
</html>
