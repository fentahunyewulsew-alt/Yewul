<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        
        /* Profile Image Section */
        header { position: relative; padding-top: 20px; }
        .settings-btn { position: absolute; left: 15px; top: 15px; font-size: 28px; cursor: pointer; color: #7f8c8d; }
        .profile-ring { width: 120px; height: 120px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; }
        .profile-ring img { width: 100%; height: 100%; object-fit: cover; }
        .platform-name { font-size: 24px; font-weight: bold; margin: 15px 0 5px; }
        .yellow-line { border-bottom: 2px solid var(--accent); width: 100%; margin: 10px 0; }
        .estab-text { color: var(--accent); font-weight: bold; font-size: 13px; margin-bottom: 20px; }

        /* Sidebar Settings */
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: #161b22; transition: 0.3s; z-index: 2000; text-align: left; padding: 20px; box-sizing: border-box; border-right: 2px solid var(--accent); }
        .sidebar.active { left: 0; }
        .close-sidebar { float: right; font-size: 24px; cursor: pointer; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; color: var(--accent); }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; background: #0d1621; color: white; border: 1px solid #2c3e50; margin-bottom: 10px; }
        .action-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-list { margin-top: 15px; max-height: 200px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .del-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2c3e50; font-size: 12px; align-items: center; }
        .btn-del { background: var(--red); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        /* Books List */
        .book-item { background: var(--card); border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 500px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; }
        .book-name { font-weight: bold; text-align: left; flex: 1; font-size: 15px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 12px; border: none; cursor: pointer; }
        .btn-view { background: var(--accent); color: black; }
        .btn-down { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <span class="close-sidebar" onclick="toggleSidebar()">&times;</span>
    <h3 id="setLabel">⚙️ ሴቲንግ</h3>
    <label id="langLabel">🌐 ቋንቋ መቀየሪያ</label>
    <select id="langSel" onchange="applyLanguage()">
        <option value="am">አማርኛ</option>
        <option value="en">English</option>
        <option value="ge">ግዕዝ</option>
    </select>
    <label id="uploadLabel">📤 አዲስ ፋይል ጫን</label>
    <input type="file" id="fIn">
    <button class="action-btn" onclick="upload()" id="uploadBtn">ወደ ሰርቨር ላክ</button>
    <label id="deleteLabel" style="margin-top:20px; color:var(--red);">🗑️ ፋይሎችን አጥፋ</label>
    <div id="adminArea" class="del-list">እየፈለገ ነው...</div>
</div>

<header>
    <i class="fas fa-cog settings-btn" onclick="toggleSidebar()"></i>
    <div class="profile-ring">
        <img src="https://res.cloudinary.com/dsbvs1h3w/image/upload/v1741951566/1000010372_yubv8s.jpg" alt="Profile">
    </div>
    <h1 id="mainTitle">የየውልሰው መድረክ</h1>
    <div class="yellow-line"></div>
    <p id="estabDate" class="estab-text">የተመሰረተበት 2018 ዓ.ም</p>
</header>

<input type="text" id="search" style="width: 90%; max-width: 500px; padding: 12px; border-radius: 10px; margin-bottom: 20px; background: #162130; border: 1px solid #2c3e50; color: white;" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="searchBooks()">

<div id="bookContainer">
    <div class="book-item">
        <span class="book-name" id="b1">መጽሐፍ ቅዱስ (Bible)</span>
        <div class="btn-group">
            <a href="መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view vTxt">አንብብ</a>
            <a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down dTxt">አውርድ</a>
        </div>
    </div>
    <div id="dynamicArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI", authDomain: "yewul-platform.firebaseapp.com", projectId: "yewul-platform", databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com", storageBucket: "yewul-platform.firebasestorage.app", appId: "1:731322746896:web:a2a9e7d9f0769b366d2295" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');

    window.applyLanguage = () => {
        const l = document.getElementById('langSel').value;
        const dict = {
            am: {mt:"የየውልሰው መድረክ", b1:"መጽሐፍ ቅዱስ", v:"አንብብ", d:"አውርድ", est:"የተመሰረተበት 2018 ዓ.ም", st:"⚙️ ሴቲንግ", ll:"🌐 ቋንቋ መቀየሪያ", ul:"📤 አዲስ ፋይል ጫን", ub:"ወደ ሰርቨር ላክ", dl:"🗑️ ፋይሎችን አጥፋ"},
            en: {mt:"Yewul Platform", b1:"Holy Bible", v:"Read", d:"Download", est:"Established in 2018", st:"⚙️ Settings", ll:"🌐 Change Language", ul:"📤 Upload File", ub:"Upload", dl:"🗑️ Delete Files"}
        };
        const c = dict[l] || dict.am;
        document.getElementById('mainTitle').innerText = c.mt;
        document.getElementById('estabDate').innerText = c.est;
        document.getElementById('setLabel').innerText = c.st;
        document.getElementById('langLabel').innerText = c.ll;
        document.getElementById('uploadLabel').innerText = c.ul;
        document.getElementById('uploadBtn').innerText = c.ub;
        document.getElementById('deleteLabel').innerText = c.dl;
        document.getElementById('b1').innerText = c.b1;
        document.querySelectorAll('.vTxt').forEach(x => x.innerText = c.v);
        document.querySelectorAll('.dTxt').forEach(x => x.innerText = c.d);
    };

    window.upload = async () => {
        const file = document.getElementById('fIn').files[0]; if(!file) return alert("ፋይል ምረጥ!");
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'yewul_preset');
        try {
            const r = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
            const data = await r.json();
            if(data.secure_url) {
                await set(push(ref(db, 'books')), { name: file.name, url: data.secure_url });
                alert("ተሳክቷል!");
            }
        } catch(e) { alert("ስህተት!"); }
    };

    onValue(ref(db, 'books'), (sn) => {
        const dyn = document.getElementById('dynamicArea'); const adm = document.getElementById('adminArea');
        dyn.innerHTML = ""; adm.innerHTML = "";
        const data = sn.val();
        if(data) {
            Object.keys(data).forEach(id => {
                dyn.innerHTML += `<div class="book-item"><span class="book-name">${data[id].name}</span><div class="btn-group"><a href="${data[id].url}" target="_blank" class="btn btn-view">Read</a><a href="${data[id].url}" download class="btn btn-down">Download</a></div></div>`;
                adm.innerHTML += `<div class="del-item"><span>${data[id].name.substring(0,15)}</span><button class="btn-del" onclick="delItem('${id}')">አጥፋ</button></div>`;
            });
        }
    });

    window.delItem = (id) => { if(confirm("ይጥፋ?")) remove(ref(db, 'books/'+id)).then(()=>alert("ጠፍቷል!")); };
    window.searchBooks = () => {
        let q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.book-item').forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    };
</script>
</body>
</html>
