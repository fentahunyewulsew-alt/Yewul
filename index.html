<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የየውልሰው መድረክ</title>
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        header { background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('IMG_20260224_043626_122.jpg'); padding: 60px 20px; border-bottom: 4px solid var(--accent); }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .search-box { width: 90%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #1e293b; color: white; margin-bottom: 20px; font-size: 16px; }
        .file-item { background: #2d3748; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3e4b5e; }
        .file-name { font-weight: bold; }
        .btn { padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-view { background: var(--accent); color: black; margin-right: 5px; }
        .btn-down { background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <img src="IMG_20260224_043626_122.jpg" class="profile-img">
    <h1>የየውልሰው መድረክ</h1>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="መጽሐፍ እዚህ ይፈልጉ..." oninput="doSearch()">

    <div id="bookList">
        <div class="file-item">
            <span class="file-name">ጉባኤ ኒቂያ</span>
            <div>
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                <a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down">አውርድ</a>
            </div>
        </div>

        <div class="file-item">
            <span class="file-name">ጉባኤ ኤፌሶን</span>
            <div>
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                <a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
            </div>
        </div>

        <div class="file-item">መጽሐፍ ቅዱስ</span>
            <span class="file-name">ጉባኤ ኬልቄዶን</span>
            <div>
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ</a>
                <a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
            </div>
        </div>
    </div>
</div>

<script>
function doSearch() {
    var input = document.getElementById("searchInput").value.toLowerCase();
    var items = document.getElementsByClassName("file-item");

    for (var i = 0; i < items.length; i++) {
        var name = items[i].getElementsByClassName("file-name")[0].innerText.toLowerCase();
        if (name.includes(input)) {
            items[i].style.display = "flex";
        } else {
            items[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
