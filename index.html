<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* Header & Settings Icon */
        .header { text-align: center; position: relative; margin-top: 20px; }
        .settings-btn { position: absolute; right: 10px; top: -10px; color: #7f8c8d; font-size: 30px; cursor: pointer; }
        
        /* Profile Image with Yellow Border */
        .profile-ring { width: 130px; height: 130px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .profile-ring img { width: 95%; height: 95%; border-radius: 50%; object-fit: cover; }

        .platform-name { font-size: 32px; font-weight: bold; margin: 15px 0 5px; }
        .estab-date { color: var(--accent); font-size: 14px; margin-bottom: 15px; }
        .yellow-line { border-bottom: 3px solid var(--accent); width: 100%; margin-bottom: 20px; }

        /* Search Bar */
        .search-container { width: 100%; max-width: 500px; margin: 0 auto 20px; }
        .search-box { width: 100%; padding: 15px; background: #162130; border: 1px solid #2c3e50; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }

        /* Book Item Card */
        .book-list { max-width: 550px; margin: 0 auto; }
        .book-card { background: var(--card); border: 1px solid #2c3e50; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .book-title { font-size: 17px; font-weight: bold; flex: 1; }
        .actions { display: flex; gap: 8px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; border: none; cursor: pointer; }
        .btn-read { background: var(--accent); color: black; }
        .btn-down { background: var(--blue); color: white; }

        /* Modal / Settings UI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; margin: 50px auto; padding: 25px; border-radius: 25px; border: 2px solid var(--accent); position: relative; }
        .close-x { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
        
        .modal-h { color: var(--accent); font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .form-label { display: block; margin: 15px 0 8px; font-weight: bold; }
        select, input[type="file"] { width: 100%; padding: 12px; border-radius: 10px; background: var(--bg); color: white; border: 1px solid #2c3e50; margin-bottom: 10px; }
        
        .up-btn { width: 100%; background: var(--accent); color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .del-list { margin-top: 20px; border-top: 1px solid #34495e; padding-top: 15px; max-height: 150px; overflow-y: auto; }
        .del-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2c3e50; }
        .del-x { background: var(--red); color: white; border: none; padding: 4px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-cog settings-btn" onclick="toggleModal(true)"></i>
        <div class="profile-ring">
            <img src="https://via.placeholder.com/150" alt="Profile" id="profilePic">
        </div>
        <div class="platform-name">Yewul Platform</div>
        <div class="estab-date" id="estLabel">የተመሰረተበት 2018 ዓ.ም</div>
        <div class="yellow-line"></div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="searchBooks()">
    </div>

    <div class="book-list" id="bookContainer">
        <div class="book-card"><div class="book-title" id="t1">መጽሐፍ ቅዱስ (Bible)</div><div class="actions"><button class="btn btn-read">Read</button><button class="btn btn-down">Download</button></div></div>
        <div class="book-card"><div class="book-title" id="t2">ጉባኤ ኒቅያ (Nicaea)</div><div class="actions"><button class="btn btn-read">Read</button><button class="btn btn-down">Download</button></div></div>
        <div id="dynamicArea"></div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="toggleModal(false)">&times;</span>
            <div class="modal-h"><i class="fas fa-sliders-h"></i> <span id="mHead">ሴቲንግ</span></div>
            
            <label class="form-label" id="lLang">🌐 ቋንቋ ይምረጡ</label>
            <select id="langPicker" onchange="changeLang()">
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="ge">ግዕዝ</option>
                <option value="ti">ትግርኛ</option>
                <option value="or">Oromiffaa</option>
                <option value="wo">Wolayttattuwaa</option>
            </select>

            <label class="form-label" id="lUp">📤 አዲስ መጽሐፍ ጫን</label>
            <input type="file" id="fileInput">
            <button class="up-btn" onclick="uploadFile()" id="upLabel">ወደ ሰርቨር ላክ</button>
            <div id="status" style="text-align:center; margin-top:5px; font-size:12px;"></div>

            <div class="del-list">
                <label class="form-label" id="lDel">🗑️ መጽሐፍት አጥፋ</label>
                <div id="adminItems"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI",
            authDomain: "yewul-platform.firebaseapp.com",
            projectId: "yewul-platform",
            databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com",
            storageBucket: "yewul-platform.firebasestorage.app",
            messagingSenderId: "731322746896",
            appId: "1:731322746896:web:a2a9e7d9f0769b366d2295"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.toggleModal = (show) => document.getElementById('settingsModal').style.display = show ? 'block' : 'none';

        // 6 Languages Support
        window.changeLang = () => {
            const l = document.getElementById('langPicker').value;
            const dict = {
                am: {h:"ሴቲንግ", up:"ወደ ሰርቨር ላክ", est:"የተመሰረተበት 2018 ዓ.ም", sh:"መጽሐፍት እዚህ ይፈልጉ...", del:"መጽሐፍት አጥፋ", t1:"መጽሐፍ ቅዱስ", t2:"ጉባኤ ኒቅያ"},
                en: {h:"Settings", up:"Upload to Server", est:"Established in 2018", sh:"Search books...", del:"Delete Books", t1:"The Bible", t2:"Nicaea"},
                ge: {h:"ሴቲንግ", up:"ወደ ሰርቨር ላክ", est:"ዘተመስረተ በ፳፻፲፰ ዓ.ም", sh:"ሐሥሥ መጻሕፍት...", del:"መጻሕፍት ደምስስ", t1:"መጽሐፍ ቅዱስ", t2:"ጉባኤ ኒቅያ"},
                ti: {h:"ሰቲንግ", up:"ናብ ሰርቨር ስደድ", est:"ዝተመስረተ 2018 ዓ.ም", sh:"መጻሕፍቲ ድለዩ...", del:"መጻሕፍቲ ሰርዝ", t1:"መጽሓፍ ቅዱስ", t2:"ጉባኤ ኒቅያ"},
                or: {h:"Settiingii", up:"Garatti Ergi", est:"Hundeeffame 2018 A.L.H", sh:"Kitaaba barbaadi...", del:"Kitaaba balleessi", t1:"Macaafa Qulqulluu", t2:"Nicaea"},
                wo: {h:"Setingiyaa", up:"Yeddite Erga", est:"Doomidda 2018 A.L.M", sh:"Maxaafa koyya...", del:"Maxaafa xayssa", t1:"Geeshsha Maxaafa", t2:"Nicaea"}
            };
            const current = dict[l];
            document.getElementById('mHead').innerText = current.h;
            document.getElementById('upLabel').innerText = current.up;
            document.getElementById('estLabel').innerText = current.est;
            document.getElementById('searchInput').placeholder = current.sh;
            document.getElementById('lDel').innerText = "🗑️ " + current.del;
            document.getElementById('t1').innerText = current.t1;
            document.getElementById('t2').innerText = current.t2;
        };

        window.searchBooks = () => {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.book-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
        };

        // Fast Upload
        window.uploadFile = async () => {
            const f = document.getElementById('fileInput').files[0];
            if(!f) return alert("ፋይል ይምረጡ!");
            const st = document.getElementById('status');
            st.innerText = "እየተጫነ ነው... ⏳";
            
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'yewul_preset');

            try {
                const r = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
                const d = await r.json();
                if(d.secure_url) {
                    await set(push(ref(db, 'books')), { name: f.name, url: d.secure_url });
                    st.innerHTML = "<span style='color:green'>ተሳክቷል! ✅</span>";
                    document.getElementById('fileInput').value = "";
                }
            } catch(e) { st.innerHTML = "<span style='color:red'>ስህተት! ❌</span>"; }
        };

        // Real-time Update & Delete
        onValue(ref(db, 'books'), (s) => {
            const area = document.getElementById('dynamicArea');
            const adm = document.getElementById('adminItems');
            area.innerHTML = ""; adm.innerHTML = "";
            const data = s.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    area.innerHTML += `<div class="book-card"><div class="book-title">${data[id].name}</div><div class="actions"><a href="${data[id].url}" target="_blank" class="btn btn-read">Read</a><a href="${data[id].url}" download class="btn btn-down">Download</a></div></div>`;
                    adm.innerHTML += `<div class="del-item"><span>${data[id].name.substring(0,20)}</span><button class="del-x" onclick="deleteItem('${id}')">X</button></div>`;
                });
            }
        });

        window.deleteItem = (id) => { if(confirm("ይጥፋ?")) remove(ref(db, 'books/'+id)); };
    </script>
</body>
</html>
