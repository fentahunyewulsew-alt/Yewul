<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Digital Library</title>
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; overflow-x: hidden; }
        
        /* Language Section */
        .lang-section { padding: 15px; background: var(--card); border-bottom: 2px solid var(--accent); }
        .lang-label { font-size: 14px; margin-bottom: 8px; display: block; color: var(--accent); font-weight: bold; }
        .lang-btns { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .lang-btn { background: #334155; color: white; border: 1px solid #475569; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-btn.active { background: var(--accent); color: black; font-weight: bold; }

        header { background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.9)), url('IMG_20260224_043626_122.jpg') center/cover; padding: 50px 20px; border-bottom: 4px solid var(--accent); position: relative; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); background: white; }

        /* Settings Sidebar */
        .settings-trigger { position: absolute; top: 15px; right: 20px; font-size: 26px; cursor: pointer; color: white; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: #161b22; transition: 0.4s; z-index: 1000; padding: 0; text-align: left; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { right: 0; }
        .sidebar-header { padding: 25px 20px; background: #0d1117; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-menu { padding: 10px 0; }
        .menu-item { display: block; padding: 15px 25px; color: #c9d1d9; text-decoration: none; border-bottom: 1px solid #21262d; font-size: 16px; }
        .menu-item:hover { background: #1f2937; color: var(--accent); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .container { max-width: 600px; margin: auto; padding: 20px; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; margin-bottom: 25px; outline: none; box-sizing: border-box; }

        /* File Item Layout */
        .file-item { background: #1e293b; padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .file-name { font-weight: bold; font-size: 15px; color: #f8fafc; text-align: left; flex: 1; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 9px 14px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12.5px; }
        .btn-view { background: var(--accent); color: #000; }
        .btn-down { background: var(--primary); color: #fff; }
    </style>
</head>
<body>

<div class="lang-section">
    <span class="lang-label" id="langLabel">ቋንቋ ቀይር (Change Language)</span>
    <div class="lang-btns">
        <button class="lang-btn active" onclick="changeLang('am', this)">አማርኛ</button>
        <button class="lang-btn" onclick="changeLang('en', this)">English</button>
        <button class="lang-btn" onclick="changeLang('ar', this)">العربية</button>
        <button class="lang-btn" onclick="changeLang('es', this)">Español</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span id="menuTitle" style="font-weight:bold; color:var(--accent);">ምናሌ</span>
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size:20px;">✕</span>
    </div>
    <div class="sidebar-menu">
        <a href="#" class="menu-item" id="menuHome">🏠 መነሻ ገጽ</a>
        <a href="https://t.me/Justice" target="_blank" class="menu-item" id="menuTele">💬 ቴሌግራም (Justice)</a>
        <a href="#" class="menu-item" id="menuAbout">ℹ️ ስለ መድረኩ</a>
    </div>
</div>

<header>
    <div class="settings-trigger" onclick="toggleSidebar()">⚙️</div>
    <img src="IMG_20260224_043626_122.jpg" class="profile-img">
    <h1 id="mainTitle">የየውልሰው መድረክ</h1>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="መጽሐፍ እዚህ ይፈልጉ..." oninput="searchFunc()">

    <div id="bookList">
        <div class="file-item">
            <span class="file-name">መጽሐፍ ቅዱስ (Bible)</span>
            <div class="btn-group">
                <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view viewText">አንብብ</a>
                <a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down downText">አውርድ</a>
            </div>
        </div>
        <div class="file-item"><span class="file-name">ጉባኤ ኒቂያ (Nicaea)</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a><a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down downText">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name">ጉባኤ ኤፌሶን (Ephesus)</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a><a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down downText">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name">ጉባኤ ኬልቄዶን (Chalcedon)</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a><a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down downText">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name">ጉባኤ ቆስጥንጥንያ (Constantinople)</span><div class="btn-group"><a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ቆስጥንጥንያ - Copy.pdf" target="_blank" class="btn btn-view viewText">አንብብ</a><a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" download class="btn btn-down downText">አውርድ</a></div></div>
    </div>
</div>

<script>
    const translations = {
        am: { title: "የየውልሰው መድረክ", search: "መጽሐፍ እዚህ ይፈልጉ...", view: "አንብብ", down: "አውርድ", menu: "ምናሌ", home: "🏠 መነሻ ገጽ", label: "ቋንቋ ቀይር", tele: "💬 ቴሌግራም", about: "ℹ️ ስለ መድረኩ", dir: "ltr" },
        en: { title: "Yewul Platform", search: "Search books here...", view: "Read", down: "Download", menu: "Menu", home: "🏠 Home", label: "Change Language", tele: "💬 Telegram", about: "ℹ️ About", dir: "ltr" },
        ar: { title: "منصة يولسو", search: "ابحث عن الكتب هنا...", view: "اقرأ", down: "تحميل", menu: "القائمة", home: "🏠 الرئيسية", label: "تغيير اللغة", tele: "💬 تيليجرام", about: "ℹ️ حول", dir: "rtl" },
        es: { title: "Plataforma Yewul", search: "Buscar libros aquí...", view: "Leer", down: "Bajar", menu: "Menú", home: "🏠 Inicio", label: "Cambiar idioma", tele: "💬 Telegram", about: "ℹ️ Acerca de", dir: "ltr" }
    };

    function changeLang(lang, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.getElementById('mainTitle').innerText = translations[lang].title;
        document.getElementById('searchInput').placeholder = translations[lang].search;
        document.getElementById('menuTitle').innerText = translations[lang].menu;
        document.getElementById('menuHome').innerText = translations[lang].home;
        document.getElementById('langLabel').innerText = translations[lang].label;
        document.getElementById('menuTele').innerText = translations[lang].tele;
        document.getElementById('menuAbout').innerText = translations[lang].about;
        
        document.querySelectorAll('.viewText').forEach(el => el.innerText = translations[lang].view);
        document.querySelectorAll('.downText').forEach(el => el.innerText = translations[lang].down);

        document.body.style.direction = translations[lang].dir;
        document.getElementById('bookList').style.textAlign = (lang === 'ar' ? 'right' : 'left');
    }

    function searchFunc() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.getElementsByClassName('file-item');
        for (let i = 0; i < items.length; i++) {
            let name = items[i].querySelector('.file-name').innerText.toLowerCase();
            items[i].style.display = name.includes(input) ? "flex" : "none";
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>

</body>
</html>
