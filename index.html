<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Assignment - Final Professional Layout</title>
    <style>
        table {
            width: auto; /* አምዶቹ እንዲጠቡ ለማድረግ */
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px auto;
        }
        th, td {
            border: 2px solid black;
            padding: 25px 15px; /* ቁመቱ (Row Height) እንዲረዝም padding ተጨምሯል */
            text-align: center;
            font-weight: bold;
            white-space: nowrap; /* ስሞች በአንድ መስመር ብቻ እንዲሆኑ */
        }

        /* ቀለማት ማስተካከያ */
        .red-col { background-color: red; color: white; }
        .name-purple-brown { background-color: #4B0082; color: white; }
        .blue-col { background-color: blue; color: white; }
        .green-col { background-color: green; color: white; }
        .yellow-col { background-color: yellow; color: black; }
        .violet-col { background-color: #EE82EE; color: black; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Output on the Browser</h2>

    <table>
        <thead>
            <tr>
                <th class="red-col">S.No</th>
                <th class="name-purple-brown">Name</th>
                <th class="blue-col">Age</th>
                <th class="green-col">Sex</th>
                <th class="yellow-col">Grade</th>
                <th class="violet-col">Name of School</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="red-col">1</td>
                <td class="name-purple-brown">Habtamu Terefe</td>
                <td class="blue-col">17</td>
                <td class="green-col">M</td>
                <td class="yellow-col">11</td>
                <td class="violet-col">Frehiwot</td>
            </tr>
            <tr>
                <td class="red-col">2</td>
                <td class="name-purple-brown">Samuel Aweke</td>
                <td class="blue-col">16</td>
                <td class="green-col">M</td>
                <td class="yellow-col">11</td>
                <td class="violet-col">Frehiwot</td>
            </tr>
            <tr>
                <td class="red-col">3</td>
                <td class="name-purple-brown">Chala Tolosa</td>
                <td class="blue-col">18</td>
                <td class="green-col">M</td>
                <td class="yellow-col">11</td>
                <td class="violet-col">Frehiwot</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
