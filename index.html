<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የየውልሰው ዲጂታል ቤተ-መጽሐፍ</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #fbbf24; --bg: #0b111e; --card: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); color: white; line-height: 1.6; }
        header { background: linear-gradient(rgba(30,58,138,0.9), rgba(0,0,0,0.8)), url('IMG_20260224_043626_122.jpg'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 25px; background: var(--card); color: white; font-size: 16px; border: 1px solid #374151; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        h2 { color: var(--accent); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .file-grid { display: grid; gap: 15px; }
        .file-item { background: #2d3748; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; transition: 0.3s; }
        .file-item:hover { transform: translateY(-3px); background: #3d495a; }
        .file-info { display: flex; justify-content: space-between; align-items: center; }
        .file-name { font-weight: bold; color: #e5e7eb; }
        .button-group { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; text-align: center; flex: 1; }
        .btn-view { background: var(--accent); color: black; }
        .btn-down { background: var(--primary); color: white; }
        .footer { text-align: center; padding: 30px; color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <img src="IMG_20260224_043626_122.jpg" class="profile-img" alt="Yewul">
    <h1>የየውልሰው ዲጂታል ቤተ-መጽሐፍ</h1>
    <p>የሃይማኖት እና የትምህርት መጽሐፍት ማዕከል</p>
</header>

<div class="container">
    <input type="text" class="search-box" placeholder="መጽሐፍ ይፈልጉ...">

    <div class="card">
        <h2>የመጽሐፍት ዝርዝር</h2>
        <div class="file-grid">
            
            <div class="file-item">
                <div class="file-info">
                    <span class="file-name">ጉባኤ ኒቂያ</span>
                </div>
                <div class="button-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view">አንብብ (Preview)</a>
                    <a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

            <div class="file-item">
                <div class="file-info">
                    <span class="file-name">ጉባኤ ኤፌሶን</span>
                </div>
                <div class="button-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ (Preview)</a>
                    <a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

            <div class="file-item">
                <div class="file-info">
                    <span class="file-name">ጉባኤ ኬልቄዶን</span>
                </div>
                <div class="button-group">
                    <a href="https://docs.google.com/viewer?url=https://fentahunyewulsew-alt.github.io/Yewul/ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view">አንብብ (Preview)</a>
                    <a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down">አውርድ</a>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="footer">
    &copy; 2026 የየውልሰው መድረክ | በ GitHub Pages የተገነባ
</div>

</body>
</html>
