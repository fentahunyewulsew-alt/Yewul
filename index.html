<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        
        /* Header Section */
        .header { position: relative; padding-top: 20px; }
        .settings-icon { position: absolute; right: 5px; top: 5px; color: #7f8c8d; font-size: 30px; cursor: pointer; }
        .profile-ring { width: 130px; height: 130px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .profile-ring img { width: 100%; height: 100%; object-fit: cover; }
        .platform-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .yellow-line { border-bottom: 2px solid var(--accent); width: 100%; margin: 10px 0; }
        .estab-text { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 20px; }

        /* Search Bar */
        .search-box { background: #162130; border: 1px solid #2c3e50; border-radius: 10px; padding: 12px; width: 95%; max-width: 500px; margin: 10px auto; color: white; outline: none; display: block; }

        /* Books List Style */
        .book-item { background: var(--card); border-radius: 12px; padding: 15px; margin: 12px auto; max-width: 500px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; }
        .book-info { font-weight: bold; text-align: left; font-size: 16px; flex: 1; }
        .btn-group { display: flex; gap: 8px; }
        .btn-read { background: var(--accent); color: black; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-down { background: var(--blue); color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; }

        /* Settings Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; border: 2px solid var(--accent); text-align: left; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
        .modal-h { color: var(--accent); font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; background: #0d1621; color: white; border: 1px solid #2c3e50; }
        .admin-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .del-list { margin-top: 20px; max-height: 150px; overflow-y: auto; background: #0d1621; border-radius: 8px; padding: 10px; }
        .del-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2c3e50; font-size: 13px; }
        .del-x { background: var(--red); color: white; border: none; padding: 4px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-cog settings-icon" onclick="openMod()"></i>
        <div class="profile-ring">
            <img src="https://res.cloudinary.com/dsbvs1h3w/image/upload/v1741951566/1000010372_yubv8s.jpg" alt="Profile">
        </div>
        <div class="platform-name">Yewul Platform</div>
        <div class="yellow-line"></div>
        <div class="estab-text" id="estDate">የተመሰረተበት 2018 ዓ.ም</div>
    </div>

    <input type="text" id="search" class="search-box" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="filterBooks()">

    <div id="booksWrapper">
        <div class="book-item"><div class="book-info" id="b1">መጽሐፍ ቅዱስ (Bible)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>
        <div class="book-item"><div class="book-info" id="b2">ጉባኤ ኒቅያ (Nicaea)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>
        <div id="dynamicBooks"></div>
    </div>

    <div id="setMod" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMod()">&times;</span>
            <div class="modal-h" id="mH">⚙️ ሴቲንግ</div>
            
            <label id="lL">🌐 ቋንቋ መቀየሪያ</label>
            <select id="langSel" onchange="applyLang()">
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="ge">ግዕዝ</option>
                <option value="ti">ትግርኛ</option>
                <option value="or">Oromoo</option>
                <option value="wo">Wolaytta</option>
            </select>

            <label id="lU">📤 አዲስ ፋይል ጫን</label>
            <input type="file" id="fIn">
            <button class="admin-btn" onclick="upload()" id="bUp">ወደ ሰርቨር ላክ</button>
            <p id="upSt" style="font-size:12px; text-align:center; margin-top:5px;"></p>

            <label id="lD">🗑️ ፋይሎችን አጥፋ</label>
            <div id="adminList" class="del-list">እየፈለገ ነው...</div>
            
            <a href="https://t.me/sew_alt" target="_blank" style="display:block; text-align:center; color:#0088cc; margin-top:15px; text-decoration:none; font-weight:bold;">Telegram (ያግኙን)</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI",
            authDomain: "yewul-platform.firebaseapp.com",
            projectId: "yewul-platform",
            databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com",
            storageBucket: "yewul-platform.firebasestorage.app",
            messagingSenderId: "731322746896",
            appId: "1:731322746896:web:a2a9e7d9f0769b366d2295"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.openMod = () => document.getElementById('setMod').style.display = 'block';
        window.closeMod = () => document.getElementById('setMod').style.display = 'none';

        // 6 ቋንቋዎች ሙሉ በሙሉ የሚሰሩ
        window.applyLang = () => {
            const l = document.getElementById('langSel').value;
            const t = {
                am: {h:"⚙️ ሴቲንግ", b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቅያ", est:"የተመሰረተበት 2018 ዓ.ም", sh:"መጽሐፍት እዚህ ይፈልጉ...", lL:"🌐 ቋንቋ መቀየሪያ", lU:"📤 አዲስ ፋይል ጫን", lD:"🗑️ ፋይሎችን አጥፋ", bUp:"ወደ ሰርቨር ላክ"},
                en: {h:"⚙️ Settings", b1:"The Bible", b2:"Nicaea", est:"Established in 2018", sh:"Search books...", lL:"🌐 Select Language", lU:"📤 Upload File", lD:"🗑️ Delete Files", bUp:"Upload Now"},
                ge: {h:"⚙️ ሴቲንግ", b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቅያ", est:"ዘተመስረተ በ፳፻፲፰ ዓ.ም", sh:"ሐሥሥ መጻሕፍት...", lL:"🌐 ቋንቋ ይምረጡ", lU:"📤 ሐዲስ ፋይል ጽዓን", lD:"🗑️ መጻሕፍት ደምስስ", bUp:"ወደ ሰርቨር ላክ"},
                ti: {h:"⚙️ ሰቲንግ", b1:"መጽሓፍ ቅዱስ", b2:"ጉባኤ ኒቅያ", est:"ዝተመስረተ 2018 ዓ.ም", sh:"መጻሕፍቲ ድለዩ...", lL:"🌐 ቋንቋ ምረጽ", lU:"📤 ሓዱሽ ፋይል ጽዓን", lD:"🗑️ ፋይላት ሰርዝ", bUp:"ሰደድ"},
                or: {h:"⚙️ Settiingii", b1:"Macaafa Qulqulluu", b2:"Nicaea", est:"Hundeeffame 2018 A.L.H", sh:"Kitaaba barbaadi...", lL:"🌐 Afaan Filadhu", lU:"📤 Kitaaba Ergi", lD:"🗑️ Kitaaba Balleessi", bUp:"Ergi"},
                wo: {h:"⚙️ Setingiyaa", b1:"Geeshsha Maxaafa", b2:"Nicaea", est:"Doomidda 2018 A.L.M", sh:"Maxaafa koyya...", lL:"🌐 Doona Doorite", lU:"📤 Maxaafa Erga", lD:"🗑️ Maxaafa Xayssa", bUp:"Erga"}
            };
            const c = t[l];
            document.getElementById('mH').innerText = c.h; document.getElementById('b1').innerText = c.b1; document.getElementById('b2').innerText = c.b2;
            document.getElementById('estDate').innerText = c.est; document.getElementById('search').placeholder = c.sh;
            document.getElementById('lL').innerText = c.lL; document.getElementById('lU').innerText = c.lU; document.getElementById('lD').innerText = c.lD;
            document.getElementById('bUp').innerText = c.bUp;
        };

        window.filterBooks = () => {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.book-item').forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
        };

        window.upload = async () => {
            const f = document.getElementById('fIn').files[0];
            if(!f) return alert("ፋይል ምረጥ!");
            document.getElementById('upSt').innerText = "እየተጫነ ነው...⏳";
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'yewul_preset');
            try {
                const r = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
                const d = await r.json();
                if(d.secure_url) {
                    await set(push(ref(db, 'books')), { name: f.name, url: d.secure_url });
                    document.getElementById('upSt').innerHTML = "<span style='color:green'>ተሳክቷል! ✅</span>";
                    document.getElementById('fIn').value = "";
                }
            } catch(e) { document.getElementById('upSt').innerText = "አልተሳካም!"; }
        };

        onValue(ref(db, 'books'), (sn) => {
            const dyna = document.getElementById('dynamicBooks'); const adm = document.getElementById('adminList');
            dyna.innerHTML = ""; adm.innerHTML = "";
            const data = sn.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    dyna.innerHTML += `<div class="book-item"><div class="book-info">${data[id].name}</div><div class="btn-group"><a href="${data[id].url}" target="_blank" class="btn-read">Read</a><a href="${data[id].url}" download class="btn-down">Download</a></div></div>`;
                    adm.innerHTML += `<div class="del-item"><span>${data[id].name.substring(0,20)}</span><button class="del-x" onclick="delBook('${id}')">X</button></div>`;
                });
            } else { adm.innerHTML = "ምንም ፋይል የለም።"; }
        });

        window.delBook = (id) => { if(confirm("ይጥፋ?")) remove(ref(db, 'books/'+id)); };
    </script>
</body>
</html>
