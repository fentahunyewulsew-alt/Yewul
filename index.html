<div id="uploadBox" style="background: #1a2635; padding: 30px; border-radius: 15px; margin: 20px; border: 2px dashed #f1c40f; text-align: center; font-family: sans-serif;">
    <h3 style="color: white; margin-bottom: 20px;">📤 አዲስ መጽሐፍ ይጫኑ</h3>
    <input type="file" id="filePicker" style="color: white; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">
    <button onclick="uploadNow()" id="btn" style="background: #f1c40f; color: #1a2635; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">ወደ ሰርቨር ላክ</button>
    
    <div id="status" style="color: #f1c40f; margin-top: 15px; font-weight: bold;">ዝግጁ...</div>
</div>

<script>
async function uploadNow() {
    const file = document.getElementById('filePicker').files[0];
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');

    if (!file) return alert("እባክህ መጀመሪያ ፋይል ምረጥ!");

    // የእርስዎ መረጃዎች
    const cloudName = "dsbvs1h3w"; 
    const uploadPreset = "yewul_preset"; 

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', uploadPreset);

    status.innerText = "እየተላከ ነው... ⏳";
    btn.disabled = true;

    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`, {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.secure_url) {
            status.innerHTML = `በተሳካ ሁኔታ ተጭኗል! ✅ <br><br> <a href="${data.secure_url}" target="_blank" style="color: #2ecc71;">ሊንኩን እዚህ ይክፈቱ</a>`;
            console.log("File Link:", data.secure_url);
        } else {
            status.innerText = "ስህተት: " + data.error.message;
            btn.disabled = false;
        }
    } catch (err) {
        status.innerText = "ግንኙነት ተቋርጧል!";
        btn.disabled = false;
    }
}
</script>
