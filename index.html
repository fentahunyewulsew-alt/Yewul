<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        
        /* Header & Settings */
        header { position: relative; padding-top: 25px; }
        .settings-btn { position: absolute; right: 10px; top: 10px; font-size: 28px; cursor: pointer; color: #7f8c8d; }
        .profile-ring { width: 120px; height: 120px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto; overflow: hidden; }
        .profile-ring img { width: 100%; height: 100%; object-fit: cover; }
        .platform-name { font-size: 26px; font-weight: bold; margin: 15px 0 5px; }
        .yellow-line { border-bottom: 2px solid var(--accent); width: 100%; margin: 10px 0; }
        .estab-text { color: var(--accent); font-weight: bold; font-size: 13px; margin-bottom: 20px; }

        /* Search */
        .search-box { width: 95%; max-width: 500px; padding: 12px; background: #162130; border: 1px solid #2c3e50; border-radius: 10px; color: white; margin-bottom: 20px; outline: none; }

        /* Book Item */
        .book-item { background: var(--card); border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 500px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; }
        .book-name { font-weight: bold; text-align: left; flex: 1; font-size: 15px; }
        .btn-group { display: flex; gap: 5px; }
        .btn { padding: 8px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 12px; border: none; cursor: pointer; }
        .btn-view { background: var(--accent); color: black; }
        .btn-down { background: var(--blue); color: white; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; border: 2px solid var(--accent); text-align: left; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
        .modal-title { color: var(--accent); font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 14px; }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; background: #0d1621; color: white; border: 1px solid #2c3e50; }
        .action-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .refresh-btn { background: #27ae60; color: white; margin-top: 10px; }
        .del-list { margin-top: 15px; max-height: 120px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 8px; }
        .del-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #2c3e50; font-size: 12px; }
        .btn-del { background: var(--red); color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-cog settings-btn" onclick="openMod()"></i>
    <div class="profile-ring">
        <img src="https://res.cloudinary.com/dsbvs1h3w/image/upload/v1741951566/1000010372_yubv8s.jpg" alt="Profile">
    </div>
    <h1 class="platform-name" id="mainTitle">የየውልሰው መድረክ</h1>
    <div class="yellow-line"></div>
    <div class="estab-text" id="estLabel">የተመሰረተበት 2018 ዓ.ም</div>
</header>

<input type="text" id="search" class="search-box" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="searchBooks()">

<div id="bookContainer">
    <div class="book-item"><span class="book-name" id="b1">መጽሐፍ ቅዱስ (Bible)</span><div class="btn-group"><a href="መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div class="book-item"><span class="book-name" id="b2">ጉባኤ ኒቂያ (Nicaea)</span><div class="btn-group"><a href="ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
    <div id="dynamicArea"></div>
</div>

<div id="setMod" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeMod()">&times;</span>
        <div class="modal-title" id="mHead">⚙️ ሴቲንግ</div>
        
        <label id="lLang">🌐 ቋንቋ መቀየሪያ</label>
        <select id="langSel" onchange="changeLanguage()">
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="ge">ግዕዝ</option>
            <option value="ti">ትግርኛ</option>
            <option value="or">Oromoo</option>
            <option value="wo">Wolaytta</option>
        </select>

        <label id="lUp">📤 አዲስ ፋይል ጫን</label>
        <input type="file" id="fIn">
        <button class="action-btn" onclick="upload()" id="btnUp">ወደ ሰርቨር ላክ</button>
        <p id="upSt" style="font-size:11px; text-align:center; margin-top:4px;"></p>

        <button class="action-btn refresh-btn" onclick="location.reload()" id="btnRef">🔄 ገጹን አድስ (Refresh)</button>

        <label id="lDel" style="margin-top:15px;">🗑️ ፋይሎችን አጥፋ</label>
        <div id="adminArea" class="del-list">እየፈለገ ነው...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI",
        authDomain: "yewul-platform.firebaseapp.com",
        projectId: "yewul-platform",
        databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com",
        storageBucket: "yewul-platform.firebasestorage.app",
        messagingSenderId: "731322746896",
        appId: "1:731322746896:web:a2a9e7d9f0769b366d2295"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.openMod = () => document.getElementById('setMod').style.display = 'block';
    window.closeMod = () => document.getElementById('setMod').style.display = 'none';

    // 6 Languages Logic
    window.changeLanguage = () => {
        const l = document.getElementById('langSel').value;
        const dict = {
            am: {mt:"የየውልሰው መድረክ", mh:"⚙️ ሴቲንግ", b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቂያ", est:"የተመሰረተበት 2018 ዓ.ም", sh:"መጽሐፍት እዚህ ይፈልጉ...", v:"አንብብ", d:"አውርድ", up:"ወደ ሰርቨር ላክ", ref:"🔄 ገጹን አድስ", del:"🗑️ ፋይሎችን አጥፋ"},
            en: {mt:"Yewul Platform", mh:"⚙️ Settings", b1:"The Bible", b2:"Nicaea", est:"Established in 2018", sh:"Search books...", v:"Read", d:"Download", up:"Upload File", ref:"🔄 Refresh Page", del:"🗑️ Delete Files"},
            ge: {mt:"የየውልሰው መድረክ", mh:"⚙️ ሴቲንግ", b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቂያ", est:"ዘተመስረተ በ፳፻፲፰ ዓ.ም", sh:"ሐሥሥ መጻሕፍት...", v:"አንብብ", d:"አውርድ", up:"ወደ ሰርቨር ላክ", ref:"🔄 ገጹን አድስ", del:"🗑️ መጻሕፍት ደምስስ"},
            ti: {mt:"የየውልሰው መድረክ", mh:"⚙️ ሰቲንግ", b1:"መጽሓፍ ቅዱስ", b2:"ጉባኤ ኒቂያ", est:"ዝተመስረተ 2018 ዓ.ም", sh:"መጻሕፍቲ ድለዩ...", v:"አንብብ", d:"አውርድ", up:"ሰደድ", ref:"🔄 ገጹን አድስ", del:"🗑️ ፋይላት ሰርዝ"},
            or: {mt:"Yewul Platform", mh:"⚙️ Settiingii", b1:"Macaafa Qulqulluu", b2:"Nicaea", est:"Hundeeffame 2018 A.L.H", sh:"Kitaaba barbaadi...", v:"Dubbisi", d:"Buusi", up:"Ergi", ref:"🔄 Refresh", del:"🗑️ Balleessi"},
            wo: {mt:"Yewul Platform", mh:"⚙️ Setingiyaa", b1:"Geeshsha Maxaafa", b2:"Nicaea", est:"Doomidda 2018 A.L.M", sh:"Maxaafa koyya...", v:"Nabbaba", d:"Wotta", up:"Erga", ref:"🔄 Refresh", del:"🗑️ Xayssa"}
        };
        const c = dict[l];
        document.getElementById('mainTitle').innerText = c.mt;
        document.getElementById('mHead').innerText = c.mh;
        document.getElementById('estLabel').innerText = c.est;
        document.getElementById('search').placeholder = c.sh;
        document.getElementById('btnUp').innerText = c.up;
        document.getElementById('btnRef').innerText = c.ref;
        document.getElementById('lDel').innerText = c.del;
        document.getElementById('b1').innerText = c.b1; document.getElementById('b2').innerText = c.b2;
        document.querySelectorAll('.vTxt').forEach(t => t.innerText = c.v);
        document.querySelectorAll('.dTxt').forEach(t => t.innerText = c.d);
    };

    window.searchBooks = () => {
        let q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.book-item').forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    };

    // Upload & Delete
    window.upload = async () => {
        const file = document.getElementById('fIn').files[0];
        if(!file) return alert("ፋይል ምረጥ!");
        document.getElementById('upSt').innerText = "እየተጫነ ነው...⏳";
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'yewul_preset');
        try {
            const r = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
            const d = await r.json();
            if(d.secure_url) {
                await set(push(ref(db, 'books')), { name: file.name, url: d.secure_url });
                document.getElementById('upSt').innerHTML = "<span style='color:green'>ተሳክቷል! ✅</span>";
                document.getElementById('fIn').value = "";
            }
        } catch(e) { document.getElementById('upSt').innerText = "አልተሳካም!"; }
    };

    onValue(ref(db, 'books'), (sn) => {
        const dyn = document.getElementById('dynamicArea'); const adm = document.getElementById('adminArea');
        dyn.innerHTML = ""; adm.innerHTML = "";
        const data = sn.val();
        if(data) {
            Object.keys(data).forEach(id => {
                dyn.innerHTML += `<div class="book-item"><span class="book-name">${data[id].name}</span><div class="btn-group"><a href="${data[id].url}" target="_blank" class="btn btn-view">Read</a><a href="${data[id].url}" download class="btn btn-down">Download</a></div></div>`;
                adm.innerHTML += `<div class="del-item"><span>${data[id].name.substring(0,22)}</span><button class="btn-del" onclick="delItem('${id}')">X</button></div>`;
            });
        } else { adm.innerHTML = "ምንም ፋይል የለም።"; }
    });

    window.delItem = (id) => { if(confirm("ይጥፋ?")) remove(ref(db, 'books/'+id)); };
</script>
</body>
</html>
