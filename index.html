<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1621; --card: #1a2635; --accent: #f1c40f; --blue: #2563eb; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        
        /* Header & Profile */
        .header { position: relative; margin-bottom: 20px; }
        .settings-icon { position: absolute; right: 0; top: 10px; color: #7f8c8d; font-size: 28px; cursor: pointer; }
        .profile-container { border: 3px solid var(--accent); width: 120px; height: 120px; border-radius: 50%; margin: 0 auto; overflow: hidden; }
        .profile-container img { width: 100%; height: 100%; object-fit: cover; }
        .estab-text { color: var(--accent); font-weight: bold; margin-top: 10px; font-size: 14px; }
        .divider { border-bottom: 2px solid var(--accent); width: 80%; margin: 15px auto; }

        /* Search Bar */
        .search-box { background: #162130; border: 1px solid #2c3e50; border-radius: 10px; padding: 12px; width: 90%; max-width: 500px; margin: 10px auto; color: white; outline: none; display: block; }

        /* Book Item List */
        .book-item { background: var(--card); border-radius: 15px; padding: 15px; margin: 12px auto; max-width: 500px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c3e50; }
        .book-info { font-weight: bold; text-align: left; font-size: 16px; flex: 1; margin-right: 10px; }
        .btn-group { display: flex; gap: 8px; }
        .btn-read { background: var(--accent); color: black; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; border: none; }
        .btn-down { background: var(--blue); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; border: none; }

        /* Modal / Settings UI */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; border: 2px solid var(--accent); text-align: left; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: white; }
        
        .modal-title { color: var(--accent); font-size: 22px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-size: 14px; }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; background: #0d1621; color: white; border: 1px solid #2c3e50; }
        
        .upload-btn { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .delete-section { margin-top: 20px; border-top: 1px solid #2c3e50; padding-top: 15px; }
        #adminList { max-height: 150px; overflow-y: auto; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #2c3e50; font-size: 13px; }
        .del-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .tg-link { display: flex; align-items: center; justify-content: center; gap: 8px; color: #0088cc; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-cog settings-icon" onclick="openModal()"></i>
        <div class="profile-container">
            <img src="https://via.placeholder.com/150" alt="Profile">
        </div>
        <h1 id="mainTitle">Yewul Platform</h1>
        <div class="estab-text" id="estabText">የተመሰረተበት 2018 ዓ.ም</div>
        <div class="divider"></div>
    </div>

    <input type="text" id="search" class="search-box" placeholder="መጽሐፍት እዚህ ይፈልጉ..." onkeyup="filterBooks()">

    <div id="bookContainer">
        <div class="book-item"><div class="book-info" id="b1">መጽሐፍ ቅዱስ (Bible)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>
        <div class="book-item"><div class="book-info" id="b2">ጉባኤ ኒቅያ (Nicaea)</div><div class="btn-group"><a href="#" class="btn-read">Read</a><a href="#" class="btn-down">Download</a></div></div>
        <div id="dynamicBooks"></div>
    </div>

    <div id="setModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="mTitle">⚙️ ሴቲንግ</div>
            
            <label id="lLang">🌐 ቋንቋ መቀየሪያ</label>
            <select id="langSelect" onchange="updateUI()">
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="ge">ግዕዝ</option>
            </select>

            <label id="lUp">📤 አዲስ ፋይል ጫን</label>
            <input type="file" id="fileInp">
            <button class="upload-btn" onclick="handleUpload()" id="btnUp">ወደ ሰርቨር ላክ</button>
            <p id="upMsg" style="text-align:center; font-size:12px; margin-top:5px;"></p>

            <div class="delete-section">
                <label id="lDel">🗑️ ፋይሎችን አጥፋ</label>
                <div id="adminList">እየፈለገ ነው...</div>
            </div>

            <a href="https://t.me/sew_alt" target="_blank" class="tg-link">
                <i class="fab fa-telegram-plane"></i> <span id="tgText">ቴሌግራም ያግኙን</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI",
            authDomain: "yewul-platform.firebaseapp.com",
            projectId: "yewul-platform",
            databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com",
            storageBucket: "yewul-platform.firebasestorage.app",
            messagingSenderId: "731322746896",
            appId: "1:731322746896:web:a2a9e7d9f0769b366d2295"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.openModal = () => document.getElementById('setModal').style.display = 'block';
        window.closeModal = () => document.getElementById('setModal').style.display = 'none';

        // ቋንቋ ሲቀየር ሁሉንም ጽሁፎች መቀየር
        window.updateUI = () => {
            const lang = document.getElementById('langSelect').value;
            const t = {
                am: {b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቅያ", h:"⚙️ ሴቲንግ", u:"ወደ ሰርቨር ላክ", est:"የተመሰረተበት 2018 ዓ.ም", sh:"መጽሐፍት እዚህ ይፈልጉ...", lUp:"📤 አዲስ ፋይል ጫን", lDel:"🗑️ ፋይሎችን አጥፋ", tg:"ቴሌግራም ያግኙን"},
                en: {b1:"The Bible", b2:"Council of Nicaea", h:"⚙️ Settings", u:"Upload to Server", est:"Established in 2018", sh:"Search books here...", lUp:"📤 Upload New File", lDel:"🗑️ Delete Files", tg:"Contact Telegram"},
                ge: {b1:"መጽሐፍ ቅዱስ", b2:"ጉባኤ ኒቅያ", h:"⚙️ ሴቲንግ", u:"ወደ ሰርቨር ላክ", est:"ዘተመስረተ በ፳፻፲፰ ዓ.ም", sh:"ሐሥሥ መጻሕፍት...", lUp:"📤 ሐዲስ ፋይል ጽዓን", lDel:"🗑️ ፋይላተ ደምስስ", tg:"ቴሌግራም ያግኙነ"}
            };
            document.getElementById('b1').innerText = t[lang].b1;
            document.getElementById('b2').innerText = t[lang].b2;
            document.getElementById('mTitle').innerText = t[lang].h;
            document.getElementById('btnUp').innerText = t[lang].u;
            document.getElementById('estabText').innerText = t[lang].est;
            document.getElementById('search').placeholder = t[lang].sh;
            document.getElementById('lUp').innerText = t[lang].lUp;
            document.getElementById('lDel').innerText = t[lang].lDel;
            document.getElementById('tgText').innerText = t[lang].tg;
        };

        // ሰርች ባር ስራ
        window.filterBooks = () => {
            let q = document.getElementById('search').value.toLowerCase();
            let items = document.querySelectorAll('.book-item');
            items.forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
        };

        // ፋይል መጫኛ (Upload)
        window.handleUpload = async () => {
            const file = document.getElementById('fileInp').files[0];
            if(!file) return alert("እባክህ ፋይል ምረጥ!");
            const msg = document.getElementById('upMsg');
            msg.innerText = "እየተጫነ ነው... ⏳";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'yewul_preset');

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:formData});
                const data = await res.json();
                if(data.secure_url) {
                    await set(push(ref(db, 'books')), { name: file.name, url: data.secure_url });
                    msg.style.color = "#27ae60"; msg.innerText = "ተሳክቷል! ✅";
                    document.getElementById('fileInp').value = "";
                }
            } catch(e) { msg.style.color = "#e74c3c"; msg.innerText = "ስህተት ተፈጥሯል!"; }
        };

        // ዳታ ማሳያ እና ማጥፊያ (Delete)
        onValue(ref(db, 'books'), (snap) => {
            const dynamic = document.getElementById('dynamicBooks');
            const admin = document.getElementById('adminList');
            dynamic.innerHTML = ""; admin.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    dynamic.innerHTML += `<div class="book-item"><div class="book-info">${data[id].name}</div><div class="btn-group"><a href="${data[id].url}" target="_blank" class="btn-read">Read</a><a href="${data[id].url}" download class="btn-down">Download</a></div></div>`;
                    admin.innerHTML += `<div class="admin-item"><span>${data[id].name}</span><button class="del-btn" onclick="deleteBook('${id}')">አጥፋ</button></div>`;
                });
            } else { admin.innerHTML = "ምንም ፋይል የለም።"; }
        });

        window.deleteBook = (id) => { if(confirm("ይህ ፋይል ለዘላለም ይጥፋ?")) remove(ref(db, 'books/'+id)); };
    </script>
</body>
</html>
