<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yewul Digital Library 2018</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        
        header { background: #1e293b; padding: 40px 20px; border-bottom: 4px solid var(--accent); position: relative; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; font-size: 26px; cursor: pointer; color: white; z-index: 1001; }
        
        /* Profile Image */
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); background: white; object-fit: cover; }

        /* Sidebar/Settings */
        .sidebar { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: #161b22; transition: 0.3s; z-index: 1002; text-align: left; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .container { max-width: 600px; margin: auto; padding: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; box-sizing: border-box; }

        /* Books List */
        .file-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .file-name { font-weight: bold; font-size: 14px; text-align: left; flex: 1; margin-right: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .btn { padding: 8px 10px; border-radius: 5px; text-decoration: none; font-size: 11px; font-weight: bold; white-space: nowrap; cursor: pointer; border: none; }
        .btn-view { background: var(--accent); color: #000; }
        .btn-down { background: var(--primary); color: #fff; }

        /* Admin/Delete Style */
        .del-btn { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; }
        .admin-item { border-bottom: 1px solid #334155; padding: 10px 0; display: flex; justify-content: space-between; font-size: 12px; }
        
        footer { padding: 30px 20px; font-size: 14px; color: var(--accent); font-weight: bold; border-top: 1px solid #334155; margin-top: 20px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <b id="menuTitle">ሴቲንግ</b>
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">✕</span>
    </div>
    
    <label style="font-size: 13px;">🌐 ቋንቋ ቀይር</label>
    <select id="langSelect" onchange="changeLang(this.value)" style="width:100%; padding:10px; margin:10px 0; background:#0d1117; color:white; border-radius:5px;">
        <option value="am">አማርኛ</option><option value="en">English</option><option value="ge">ግዕዝ</option>
        <option value="ti">ትግርኛ</option><option value="or">Oromoo</option><option value="wo">Wolaytta</option>
    </select>

    <label style="font-size: 13px;">📤 ፋይል ጫን</label>
    <input type="file" id="fileInput" style="margin:10px 0; font-size: 12px;">
    <button onclick="uploadFile()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ወደ ሰርቨር ላክ</button>
    <div id="status" style="font-size: 11px; margin-top:5px; color: #27ae60;"></div>

    <button onclick="location.reload()" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; font-weight:bold; margin-top:15px; cursor:pointer;">🔄 ገጹን አድስ (Refresh)</button>

    <label style="font-size: 13px; display:block; margin-top:20px; color:#e74c3c;">🗑️ ፋይሎችን አጥፋ</label>
    <div id="deleteList">እየፈለገ ነው...</div>
</div>

<header>
    <div class="settings-trigger" onclick="toggleSidebar()">⚙️</div>
    <img src="https://res.cloudinary.com/dsbvs1h3w/image/upload/v1741951566/1000010372_yubv8s.jpg" class="profile-img">
    <h1 id="mainTitle">የየውልሰው መድረክ</h1>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="መጽሐፍ እዚህ ይፈልጉ..." oninput="searchFunc()">
    
    <div id="bookList">
        <div class="file-item"><span class="file-name" id="t1">መጽሐፍ ቅዱስ (Bible)</span><div class="btn-group"><a href="መጽሐፍ ቅዱስ .docx" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="መጽሐፍ ቅዱስ .docx" download class="btn btn-down dTxt">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name" id="t2">ጉባኤ ኒቂያ (Nicaea)</span><div class="btn-group"><a href="ጉባኤ ኒቂያ - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኒቂያ - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name" id="t3">ጉባኤ ኤፌሶን (Ephesus)</span><div class="btn-group"><a href="ጉባኤ ኤፌሶን - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኤፌሶን - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name" id="t4">ጉባኤ ኬልቄዶን (Chalcedon)</span><div class="btn-group"><a href="ጉባኤ ኬልቄዶን - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ኬልቄዶን - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
        <div class="file-item"><span class="file-name" id="t5">ጉባኤ ቁስጥንጥንያ</span><div class="btn-group"><a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" target="_blank" class="btn btn-view vTxt">አንብብ</a><a href="ጉባኤ ቆስጥንጥንያ - Copy.pdf" download class="btn btn-down dTxt">አውርድ</a></div></div>
        <div id="dynamicBooks"></div>
    </div>
</div>

<footer id="footerText">© 2018 አ.ም የተሰራ | የየውልሰው ዲጂታል ቤተ-መጽሐፍ</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyD0aNWGu5ks476yfm4Q-FLxepkSWtYAJcI", authDomain: "yewul-platform.firebaseapp.com", projectId: "yewul-platform", databaseURL: "https://yewul-platform-default-rtdb.firebaseio.com", storageBucket: "yewul-platform.firebasestorage.app", appId: "1:731322746896:web:a2a9e7d9f0769b366d2295" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    window.changeLang = (l) => {
        const dict = {
            am: {title:"የየውልሰው መድረክ", footer:"© 2018 አ.ም የተሰራ | የየውልሰው ዲጂታል ቤተ-መጽሐፍ", search:"መጽሐፍ እዚህ ይፈልጉ...", v:"አንብብ", d:"አውርድ"},
            en: {title:"Yewul Platform", footer:"© 2018 E.C | Yewul Digital Library", search:"Search books here...", v:"Read", d:"Download"},
            ge: {title:"የየውልሰው መድረክ", footer:"ዘተመስረተ በ፳፻፲፰ ዓ.ም | የየውልሰው ቤተ-መጽሐፍ", search:"ሐሥሥ መጻሕፍት...", v:"አንብብ", d:"አውርድ"},
            ti: {title:"የየውልሰው መድረክ", footer:"ዝተመስረተ 2018 ዓ.ም | የየውልሰው ቤተ-መጽሐፍ", search:"መጻሕፍቲ ድለዩ...", v:"አንብብ", d:"አውርድ"},
            or: {title:"Yewul Platform", footer:"Hundeeffame 2018 A.L.H | Yewul Digital Library", search:"Kitaaba barbaadi...", v:"Dubbisi", d:"Buusi"},
            wo: {title:"Yewul Platform", footer:"Doomidda 2018 A.L.M | Yewul Digital Library", search:"Maxaafa koyya...", v:"Nabbaba", d:"Wotta"}
        };
        const c = dict[l];
        document.getElementById('mainTitle').innerText = c.title;
        document.getElementById('footerText').innerText = c.footer;
        document.getElementById('searchInput').placeholder = c.search;
        document.querySelectorAll('.vTxt').forEach(el => el.innerText = c.v);
        document.querySelectorAll('.dTxt').forEach(el => el.innerText = c.d);
    };

    window.uploadFile = async () => {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("ፋይል ይምረጡ!");
        document.getElementById('status').innerText = "እየተጫነ ነው...⏳";
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'yewul_preset');
        const res = await fetch(`https://api.cloudinary.com/v1_1/dsbvs1h3w/auto/upload`, {method:'POST', body:fd});
        const data = await res.json();
        if(data.secure_url) {
            await set(push(ref(db, 'books')), { name: file.name, url: data.secure_url });
            document.getElementById('status').innerText = "ተሳክቷል! ✅";
            document.getElementById('fileInput').value = "";
        }
    };

    onValue(ref(db, 'books'), (snapshot) => {
        const dyn = document.getElementById('dynamicBooks'); const delArea = document.getElementById('deleteList');
        dyn.innerHTML = ""; delArea.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.keys(data).forEach(id => {
                dyn.innerHTML += `<div class="file-item"><span class="file-name">${data[id].name}</span><div class="btn-group"><a href="${data[id].url}" target="_blank" class="btn btn-view">አንብብ</a><a href="${data[id].url}" download class="btn btn-down">አውርድ</a></div></div>`;
                delArea.innerHTML += `<div class="admin-item"><span>${data[id].name.substring(0,20)}</span><button class="del-btn" onclick="deleteBook('${id}')">አጥፋ</button></div>`;
            });
        } else { delArea.innerHTML = "ምንም ፋይል የለም።"; }
    });

    window.deleteBook = (id) => { if(confirm("ይጥፋ?")) remove(ref(db, 'books/' + id)); };
    window.searchFunc = () => {
        let q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.file-item').forEach(it => it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    };
</script>
</body>
</html>
